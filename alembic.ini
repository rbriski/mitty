# Alembic configuration for Mitty.
#
# The sqlalchemy.url is intentionally left as a placeholder.
# Set the DATABASE_URL environment variable or override this value
# before running migrations against a real database.

[alembic]
script_location = alembic
sqlalchemy.url = postgresql://localhost/mitty

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
